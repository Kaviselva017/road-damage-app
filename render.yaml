services:
  - type: web
    name: roadwatch-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && bash start.sh
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///./road_damage.db
      - key: SECRET_KEY
        sync: false          # Set in Render Dashboard → paste a strong random string
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"
      - key: CORS_ORIGINS
        value: https://road-damage-appsystem.onrender.com
      - key: UPLOAD_DIR
        value: uploads
      - key: YOLO_MODEL_PATH
        value: ai_model/road_damage_yolov8.pt
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false          # Set in Render Dashboard: kaviselvakumar2005@gmail.com
      - key: SMTP_PASS
        sync: false          # Set in Render Dashboard: your 16-char Gmail app password
      - key: EMAIL_FROM
        sync: false          # Same as SMTP_USER
      - key: ADMIN_EMAIL
        sync: false          # Same as SMTP_USER
      - key: BASE_URL
        value: https://road-damage-appsystem.onrender.com
      - key: RESEND_API_KEY
        sync: false          # Optional — Resend fallback if Gmail fails