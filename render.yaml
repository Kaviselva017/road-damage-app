# render.yaml — RoadWatch deployment manifest
# Deploy steps:
#   1. Push this file to GitHub
#   2. In Render dashboard: New → Blueprint → connect your repo
#   3. Set all `sync: false` vars in the Render dashboard (they are secrets)
#   4. Render will create both the web service and the PostgreSQL database

services:
  - type: web
    name: roadwatch-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && bash start.sh
    healthCheckPath: /healthz
    envVars:
      # ── Application ──────────────────────────────────────────
      - key: APP_ENV
        value: production

      # ── Database ─────────────────────────────────────────────
      # Uses the Render PostgreSQL add-on for persistent storage.
      # SQLite does NOT persist on Render's ephemeral filesystem!
      - key: DATABASE_URL
        fromDatabase:
          name: roadwatch-db
          property: connectionString

      # ── Security ──────────────────────────────────────────────
      - key: SECRET_KEY
        sync: false          # REQUIRED — paste a strong random string in dashboard
                             # Generate one: python -c "import secrets; print(secrets.token_hex(32))"
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"       # 7 days

      # ── CORS ──────────────────────────────────────────────────
      # Add every frontend origin, comma-separated.
      - key: CORS_ORIGINS
        value: "https://road-damage-appsystem.onrender.com,https://roadwatch-dashboard.onrender.com"

      # ── File storage ──────────────────────────────────────────
      - key: UPLOAD_DIR
        value: uploads
      - key: YOLO_MODEL_PATH
        value: ../ai_model/road_damage_yolov8.pt

      # ── Email — Gmail SMTP ────────────────────────────────────
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false          # your Gmail address
      - key: SMTP_PASS
        sync: false          # 16-char Gmail App Password (no spaces)
      - key: EMAIL_FROM
        sync: false          # same as SMTP_USER
      - key: ADMIN_EMAIL
        sync: false          # receives high-severity alerts

      # ── Notification links ─────────────────────────────────────
      - key: BASE_URL
        value: https://road-damage-appsystem.onrender.com

      # ── Email fallback — Resend ────────────────────────────────
      - key: RESEND_API_KEY
        sync: false          # optional — only needed if Gmail SMTP fails

# ── PostgreSQL database (persistent storage for production) ──────
databases:
  - name: roadwatch-db
    databaseName: roadwatch
    user: roadwatch
    plan: free