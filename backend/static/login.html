<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoadWatch — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --citizen-a: #00f5c4;
  --citizen-b: #0098ff;
  --officer-a: #ff6b35;
  --officer-b: #f7c948;
  --admin-a: #a855f7;
  --admin-b: #ec4899;
  --bg: #04060d;
  --text: #e8edf8;
  --muted: #4a5568;
}

html, body {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--bg);
  font-family: 'Outfit', sans-serif;
  color: var(--text);
}

/* ── CANVAS BACKGROUND ── */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ── GRID OVERLAY ── */
.grid-overlay {
  position: fixed; inset: 0; z-index: 1; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}

/* ── MAIN WRAPPER ── */
.portal {
  position: relative; z-index: 10;
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1.5rem;
}

/* ── HEADER ── */
.portal-header {
  text-align: center;
  margin-bottom: 3rem;
  animation: fadeDown 0.8s ease both;
}
.portal-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(2.5rem, 6vw, 4rem);
  letter-spacing: 0.1em;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.5) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  line-height: 1;
  margin-bottom: 0.4rem;
}
.portal-tagline {
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}
.portal-tagline span {
  display: inline-block;
  width: 20px; height: 1px;
  background: var(--muted);
  vertical-align: middle;
  margin: 0 8px;
}

/* ── ROLE SELECTOR ── */
.role-selector {
  display: flex;
  gap: 1.2rem;
  margin-bottom: 2.5rem;
  animation: fadeUp 0.8s 0.2s ease both;
}

.role-card {
  position: relative;
  width: 160px;
  padding: 1.5rem 1rem;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(255,255,255,0.03);
  cursor: pointer;
  text-align: center;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), border-color 0.3s;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.role-card::before {
  content: '';
  position: absolute; inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
  border-radius: inherit;
}
.role-card.citizen::before { background: radial-gradient(ellipse at top, rgba(0,245,196,0.15), transparent 70%); }
.role-card.officer::before { background: radial-gradient(ellipse at top, rgba(255,107,53,0.15), transparent 70%); }
.role-card.admin::before { background: radial-gradient(ellipse at top, rgba(168,85,247,0.15), transparent 70%); }

.role-card:hover::before, .role-card.active::before { opacity: 1; }
.role-card:hover { transform: translateY(-6px) scale(1.02); }
.role-card.active { transform: translateY(-8px) scale(1.04); }
.role-card.active.citizen { border-color: var(--citizen-a); box-shadow: 0 20px 60px rgba(0,245,196,0.2), 0 0 0 1px rgba(0,245,196,0.3); }
.role-card.active.officer { border-color: var(--officer-a); box-shadow: 0 20px 60px rgba(255,107,53,0.2), 0 0 0 1px rgba(255,107,53,0.3); }
.role-card.active.admin { border-color: var(--admin-a); box-shadow: 0 20px 60px rgba(168,85,247,0.2), 0 0 0 1px rgba(168,85,247,0.3); }

.role-icon-wrap {
  width: 56px; height: 56px;
  border-radius: 16px;
  margin: 0 auto 0.9rem;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  position: relative;
  transition: transform 0.3s;
}
.role-card.citizen .role-icon-wrap { background: linear-gradient(135deg, rgba(0,245,196,0.15), rgba(0,152,255,0.15)); border: 1px solid rgba(0,245,196,0.2); }
.role-card.officer .role-icon-wrap { background: linear-gradient(135deg, rgba(255,107,53,0.15), rgba(247,201,72,0.15)); border: 1px solid rgba(255,107,53,0.2); }
.role-card.admin .role-icon-wrap { background: linear-gradient(135deg, rgba(168,85,247,0.15), rgba(236,72,153,0.15)); border: 1px solid rgba(168,85,247,0.2); }
.role-card.active .role-icon-wrap { transform: scale(1.1) rotate(-3deg); }

.role-name {
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.3rem;
}
.role-card.citizen .role-name { color: var(--citizen-a); }
.role-card.officer .role-name { color: var(--officer-a); }
.role-card.admin .role-name { color: var(--admin-a); }

.role-desc {
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 1.4;
}

/* ACTIVE INDICATOR */
.role-card.active .role-desc { color: rgba(255,255,255,0.5); }
.active-pip {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  width: 6px; height: 6px; border-radius: 50%;
  opacity: 0; transition: opacity 0.3s;
}
.role-card.active.citizen .active-pip { background: var(--citizen-a); opacity: 1; box-shadow: 0 0 8px var(--citizen-a); }
.role-card.active.officer .active-pip { background: var(--officer-a); opacity: 1; box-shadow: 0 0 8px var(--officer-a); }
.role-card.active.admin .active-pip { background: var(--admin-a); opacity: 1; box-shadow: 0 0 8px var(--admin-a); }

/* ── LOGIN FORM ── */
.login-form-wrap {
  width: 100%;
  max-width: 380px;
  animation: fadeUp 0.8s 0.4s ease both;
}

.form-glass {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 24px;
  padding: 2rem;
  backdrop-filter: blur(20px);
  position: relative;
  overflow: hidden;
  transition: border-color 0.4s, box-shadow 0.4s;
}
.form-glass::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
}

.form-glass.citizen-theme { border-color: rgba(0,245,196,0.15); }
.form-glass.citizen-theme::after { background: radial-gradient(ellipse at top, rgba(0,245,196,0.06), transparent 60%); }
.form-glass.officer-theme { border-color: rgba(255,107,53,0.15); }
.form-glass.officer-theme::after { background: radial-gradient(ellipse at top, rgba(255,107,53,0.06), transparent 60%); }
.form-glass.admin-theme { border-color: rgba(168,85,247,0.15); }
.form-glass.admin-theme::after { background: radial-gradient(ellipse at top, rgba(168,85,247,0.06), transparent 60%); }
.form-glass::after { content:''; position:absolute; inset:0; pointer-events:none; border-radius:inherit; }

.form-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.4rem;
  letter-spacing: 0.08em;
  margin-bottom: 0.25rem;
  transition: color 0.4s;
}
.form-subtitle { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.5rem; font-family: 'JetBrains Mono', monospace; }

.field-group { margin-bottom: 1rem; }
.field-label {
  display: block;
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--muted);
  margin-bottom: 0.4rem;
}
.field-input-wrap { position: relative; }
.field-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 0.75rem 1rem 0.75rem 2.8rem;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.9rem;
  transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
  outline: none;
}
.field-input::placeholder { color: rgba(255,255,255,0.15); }
.field-input:focus {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.2);
}
.citizen-theme .field-input:focus { border-color: rgba(0,245,196,0.4); box-shadow: 0 0 0 3px rgba(0,245,196,0.08); }
.officer-theme .field-input:focus { border-color: rgba(255,107,53,0.4); box-shadow: 0 0 0 3px rgba(255,107,53,0.08); }
.admin-theme .field-input:focus { border-color: rgba(168,85,247,0.4); box-shadow: 0 0 0 3px rgba(168,85,247,0.08); }

.field-icon {
  position: absolute; left: 0.9rem; top: 50%; transform: translateY(-50%);
  font-size: 0.9rem; opacity: 0.4; pointer-events: none;
}

/* ERROR */
.error-banner {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: 10px;
  padding: 0.6rem 0.9rem;
  font-size: 0.82rem;
  color: #fc8181;
  margin-bottom: 1rem;
  display: none;
  animation: shake 0.4s ease;
}
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* SUBMIT BUTTON */
.btn-submit {
  width: 100%;
  border: none;
  border-radius: 12px;
  padding: 0.85rem;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.12em;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s, box-shadow 0.3s;
  margin-top: 0.5rem;
}
.btn-submit:hover { transform: translateY(-2px); }
.btn-submit:active { transform: translateY(0); }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.citizen-theme .btn-submit { background: linear-gradient(135deg, var(--citizen-a), var(--citizen-b)); color: #001a14; box-shadow: 0 8px 30px rgba(0,245,196,0.3); }
.officer-theme .btn-submit { background: linear-gradient(135deg, var(--officer-a), var(--officer-b)); color: #1a0800; box-shadow: 0 8px 30px rgba(255,107,53,0.3); }
.admin-theme .btn-submit { background: linear-gradient(135deg, var(--admin-a), var(--admin-b)); color: #fff; box-shadow: 0 8px 30px rgba(168,85,247,0.3); }

.btn-submit::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.btn-submit:hover::before { opacity: 1; }

/* REGISTER LINK */
.register-row {
  text-align: center;
  margin-top: 1rem;
  font-size: 0.82rem;
  color: var(--muted);
}
.register-row a { cursor: pointer; text-decoration: underline; text-underline-offset: 3px; }
.citizen-theme .register-row a { color: var(--citizen-a); }
.officer-theme .register-row a { color: var(--officer-a); }
.admin-theme .register-row a { color: var(--admin-a); }

/* REGISTER FORM */
.register-fields { display: none; }
.register-fields.show { display: block; animation: fadeDown 0.3s ease; }

/* ── SPINNER ── */
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(0,0,0,0.25); border-top-color: currentColor;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg) } }

/* ── FLOATING PARTICLES ── */
.particle {
  position: fixed; border-radius: 50%;
  pointer-events: none; z-index: 2;
  animation: float linear infinite;
}
@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
}

/* ── STATUS TICKER ── */
.status-ticker {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
  border-radius: 50px; padding: 0.4rem 1.2rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; color: var(--muted);
  display: flex; align-items: center; gap: 0.6rem;
  z-index: 20; backdrop-filter: blur(10px);
}
.ticker-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--citizen-a); animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* ── ANIMATIONS ── */
@keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

/* ── SCAN LINE ── */
.scan-line {
  position: fixed; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(0,245,196,0.3), transparent);
  z-index: 3; pointer-events: none;
  animation: scanMove 8s linear infinite;
}
@keyframes scanMove { 0%{top:-1px;opacity:0} 5%{opacity:1} 95%{opacity:1} 100%{top:100%;opacity:0} }

/* ── CORNER DECORATIONS ── */
.corner { position: fixed; width: 40px; height: 40px; z-index: 5; pointer-events: none; }
.corner-tl { top: 1.5rem; left: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); border-left: 1px solid rgba(255,255,255,0.1); }
.corner-tr { top: 1.5rem; right: 1.5rem; border-top: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); }
.corner-bl { bottom: 1.5rem; left: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); border-left: 1px solid rgba(255,255,255,0.1); }
.corner-br { bottom: 1.5rem; right: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1); }

/* VERSION TAG */
.version-tag {
  position: fixed; top: 1.6rem; right: 5rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem; color: rgba(255,255,255,0.12);
  z-index: 20; letter-spacing: 0.1em;
}

/* SUCCESS FLASH */
.success-flash {
  position: fixed; inset: 0; z-index: 999;
  background: rgba(0,245,196,0.05);
  pointer-events: none; opacity: 0;
  transition: opacity 0.3s;
}
.success-flash.show { opacity: 1; }

@media (max-width: 600px) {
  .role-card { width: 100px; padding: 1.2rem 0.7rem; }
  .role-icon-wrap { width: 44px; height: 44px; font-size: 1.3rem; }
  .role-name { font-size: 0.72rem; }
  .role-selector { gap: 0.7rem; }
  .form-glass { padding: 1.5rem; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="grid-overlay"></div>
<div class="scan-line"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>
<div class="version-tag">v2.0.0</div>
<div class="success-flash" id="success-flash"></div>

<div class="portal">
  <!-- HEADER -->
  <div class="portal-header">
    <div class="portal-logo">🛣 RoadWatch</div>
    <div class="portal-tagline"><span></span>Select your role to continue<span></span></div>
  </div>

  <!-- ROLE SELECTOR -->
  <div class="role-selector">
    <div class="role-card citizen active" onclick="selectRole('citizen')">
      <div class="role-icon-wrap">🧑‍💼</div>
      <div class="role-name">Citizen</div>
      <div class="role-desc">Report road damage in your area</div>
      <div class="active-pip"></div>
    </div>
    <div class="role-card officer" onclick="selectRole('officer')">
      <div class="role-icon-wrap">👮</div>
      <div class="role-name">Officer</div>
      <div class="role-desc">Manage and resolve complaints</div>
      <div class="active-pip"></div>
    </div>
    <div class="role-card admin" onclick="selectRole('admin')">
      <div class="role-icon-wrap">🛡️</div>
      <div class="role-name">Admin</div>
      <div class="role-desc">Full system administration</div>
      <div class="active-pip"></div>
    </div>
  </div>

  <!-- LOGIN FORM -->
  <div class="login-form-wrap">
    <div class="form-glass citizen-theme" id="form-glass">
      <div class="form-title" id="form-title" style="color:var(--citizen-a)">Citizen Login</div>
      <div class="form-subtitle" id="form-subtitle">// citizen_portal.access</div>

      <!-- REGISTER FIELDS (citizen only) -->
      <div class="register-fields" id="register-fields">
        <div class="field-group">
          <label class="field-label">Full Name</label>
          <div class="field-input-wrap">
            <span class="field-icon">👤</span>
            <input class="field-input" id="reg-name" type="text" placeholder="Your full name"/>
          </div>
        </div>
        <div class="field-group">
          <label class="field-label">Phone Number</label>
          <div class="field-input-wrap">
            <span class="field-icon">📱</span>
            <input class="field-input" id="reg-phone" type="tel" placeholder="9876543210"/>
          </div>
        </div>
      </div>

      <div class="error-banner" id="error-banner"></div>

      <div class="field-group">
        <label class="field-label">Email Address</label>
        <div class="field-input-wrap">
          <span class="field-icon">✉️</span>
          <input class="field-input" id="email-input" type="email" placeholder="you@example.com"/>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="field-input-wrap">
          <span class="field-icon">🔑</span>
          <input class="field-input" id="pass-input" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleSubmit()"/>
        </div>
      </div>

      <button class="btn-submit" id="submit-btn" onclick="handleSubmit()">
        Enter Portal
      </button>

      <div class="register-row" id="register-row">
        Don't have an account? <a onclick="toggleRegister()">Create one</a>
      </div>
    </div>
  </div>
</div>

<!-- STATUS TICKER -->
<div class="status-ticker">
  <div class="ticker-dot" id="ticker-dot"></div>
  <span id="ticker-text">System online — All services operational</span>
</div>

<script>
const API = (window.location.hostname === 'localhost' ? 'http://localhost:8000' : window.location.origin) + '/api';
let currentRole = 'citizen';
let isRegisterMode = false;

// ── ROLE THEMES ──────────────────────────────────────
const themes = {
  citizen: {
    color: '#00f5c4',
    title: 'Citizen Login',
    subtitle: '// citizen_portal.access',
    btnText: 'Enter Citizen Portal',
    themeClass: 'citizen-theme',
    showRegister: true,
    redirectUrl: '/citizen',
    endpoint: '/auth/login',
    tickerColor: '#00f5c4',
  },
  officer: {
    color: '#ff6b35',
    title: 'Officer Login',
    subtitle: '// field_officer.connect',
    btnText: 'Enter Officer Dashboard',
    themeClass: 'officer-theme',
    showRegister: false,
    redirectUrl: '/static/dashboard.html',
    endpoint: '/auth/officer/login',
    tickerColor: '#ff6b35',
  },
  admin: {
    color: '#a855f7',
    title: 'Admin Access',
    subtitle: '// admin_console.secure',
    btnText: 'Enter Admin Panel',
    themeClass: 'admin-theme',
    showRegister: false,
    redirectUrl: '/admin',
    endpoint: '/auth/officer/login',
    tickerColor: '#a855f7',
  }
};

function selectRole(role) {
  currentRole = role;
  isRegisterMode = false;

  // Update role cards
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`.role-card.${role}`).classList.add('active');

  const t = themes[role];
  const glass = document.getElementById('form-glass');

  // Animate form out and in
  glass.style.opacity = '0';
  glass.style.transform = 'translateY(10px)';
  setTimeout(() => {
    glass.className = `form-glass ${t.themeClass}`;
    document.getElementById('form-title').textContent = t.title;
    document.getElementById('form-title').style.color = t.color;
    document.getElementById('form-subtitle').textContent = t.subtitle;
    document.getElementById('submit-btn').textContent = t.btnText;
    document.getElementById('register-row').style.display = t.showRegister ? 'block' : 'none';
    document.getElementById('register-fields').classList.remove('show');
    document.getElementById('error-banner').style.display = 'none';
    document.getElementById('email-input').value = '';
    document.getElementById('pass-input').value = '';

    // Update ticker
    document.getElementById('ticker-dot').style.background = t.tickerColor;
    document.getElementById('ticker-dot').style.boxShadow = `0 0 8px ${t.tickerColor}`;
    document.getElementById('ticker-text').textContent = `${role.charAt(0).toUpperCase()+role.slice(1)} portal selected — Ready to authenticate`;

    // Update particles color
    updateParticleColors(t.color);

    glass.style.opacity = '1';
    glass.style.transform = 'translateY(0)';
    glass.style.transition = 'opacity 0.3s, transform 0.3s';
  }, 150);
}

function toggleRegister() {
  isRegisterMode = !isRegisterMode;
  const fields = document.getElementById('register-fields');
  const btn = document.getElementById('submit-btn');
  const link = document.querySelector('#register-row a');
  const title = document.getElementById('form-title');
  const subtitle = document.getElementById('form-subtitle');

  if (isRegisterMode) {
    fields.classList.add('show');
    btn.textContent = 'Create Account';
    link.textContent = 'Already have an account? Sign in';
    title.textContent = 'Create Account';
    subtitle.textContent = '// citizen_registration.new';
  } else {
    fields.classList.remove('show');
    btn.textContent = themes[currentRole].btnText;
    link.textContent = "Don't have an account? Create one";
    title.textContent = themes[currentRole].title;
    subtitle.textContent = themes[currentRole].subtitle;
  }
  document.getElementById('error-banner').style.display = 'none';
}

async function handleSubmit() {
  const email = document.getElementById('email-input').value.trim();
  const password = document.getElementById('pass-input').value;
  const errEl = document.getElementById('error-banner');
  const btn = document.getElementById('submit-btn');
  const t = themes[currentRole];

  if (!email || !password) { showError('Please enter your email and password'); return; }

  btn.innerHTML = `<span class="spinner"></span>Authenticating...`;
  btn.disabled = true;
  errEl.style.display = 'none';

  try {
    if (isRegisterMode) {
      // Register citizen
      const name = document.getElementById('reg-name').value.trim();
      const phone = document.getElementById('reg-phone').value.trim();
      if (!name) { showError('Please enter your full name'); btn.innerHTML='Create Account'; btn.disabled=false; return; }
      const res = await fetch(`${API}/auth/register`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name, email, password, phone})
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Registration failed');
      // Auto login after register
      await doLogin(email, password, t);
    } else {
      await doLogin(email, password, t);
    }
  } catch(e) {
    showError(e.message || 'Authentication failed');
    btn.textContent = isRegisterMode ? 'Create Account' : t.btnText;
    btn.disabled = false;
  }
}

async function doLogin(email, password, t) {
  const res = await fetch(`${API}${t.endpoint}`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email, password})
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || 'Invalid credentials');

  // Store token
  const tokenKey = currentRole === 'citizen' ? 'citizen_token' : currentRole === 'officer' ? 'officer_token' : 'admin_token';
  const nameKey = currentRole === 'citizen' ? 'citizen_name' : currentRole === 'officer' ? 'officer_name' : 'admin_name';
  localStorage.setItem(tokenKey, data.access_token);
  localStorage.setItem(nameKey, email.split('@')[0]);

  // Success flash
  const flash = document.getElementById('success-flash');
  flash.style.background = `rgba(${hexToRgb(t.color)}, 0.08)`;
  flash.classList.add('show');

  // Update ticker
  document.getElementById('ticker-text').textContent = `✓ Authenticated as ${email.split('@')[0]} — Redirecting...`;

  setTimeout(() => {
    window.location.href = t.redirectUrl + "?tk=" + encodeURIComponent(data.access_token) + "&nm=" + encodeURIComponent(email.split("@")[0]);
  }, 600);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = '⚠ ' + msg;
  el.style.display = 'block';
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake 0.4s ease';
}

// ── CANVAS ANIMATION ─────────────────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, nodes = [], particleColor = '#00f5c4';

function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

class Node {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random()-0.5)*0.4;
    this.vy = (Math.random()-0.5)*0.4;
    this.r = Math.random()*1.5+0.5;
    this.opacity = Math.random()*0.4+0.1;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x<0||this.x>W||this.y<0||this.y>H) this.reset();
  }
}

for (let i=0;i<80;i++) nodes.push(new Node());

function hexToRgbArr(hex) {
  if (hex.startsWith('#')) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }
  return [0,245,196];
}

let animColor = [0,245,196], targetColor = [0,245,196];

function lerpColor(a,b,t) { return a.map((v,i)=>Math.round(v+(b[i]-v)*t)); }

function updateParticleColors(hex) { targetColor = hexToRgbArr(hex); }

function drawFrame() {
  ctx.clearRect(0,0,W,H);
  animColor = lerpColor(animColor, targetColor, 0.05);
  const [r,g,b] = animColor;

  nodes.forEach(n=>n.update());

  // Draw connections
  for (let i=0;i<nodes.length;i++) {
    for (let j=i+1;j<nodes.length;j++) {
      const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if (dist<120) {
        ctx.beginPath();
        ctx.moveTo(nodes[i].x,nodes[i].y);
        ctx.lineTo(nodes[j].x,nodes[j].y);
        ctx.strokeStyle=`rgba(${r},${g},${b},${(1-dist/120)*0.08})`;
        ctx.lineWidth=0.5;
        ctx.stroke();
      }
    }
  }

  // Draw nodes
  nodes.forEach(n=>{
    ctx.beginPath();
    ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${r},${g},${b},${n.opacity})`;
    ctx.fill();
  });

  requestAnimationFrame(drawFrame);
}
drawFrame();

// ── FLOATING DOM PARTICLES ────────────────────────────
function spawnParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random()*4+2;
  const [r,g,b] = animColor;
  p.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}vw;
    background:rgba(${r},${g},${b},0.6);
    animation-duration:${Math.random()*10+8}s;
    animation-delay:${Math.random()*5}s;
    box-shadow:0 0 ${size*2}px rgba(${r},${g},${b},0.4);
  `;
  document.body.appendChild(p);
  setTimeout(()=>p.remove(), 18000);
}
setInterval(spawnParticle, 600);
