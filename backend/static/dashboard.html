<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Officer Dashboard — RoadWatch</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:#0a0c10;--surface:#10131a;--card:#141820;--border:#1e2535;
  --accent:#f5a623;--accent2:#3ecfb2;--danger:#e05c5c;--blue:#3b82f6;
  --text:#e8eaf0;--muted:#5a6480;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.35;}
.topbar{position:relative;z-index:10;background:rgba(16,19,26,0.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;}
.logo span{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:0.7rem;}
.officer-name{font-size:0.85rem;color:var(--muted);}
.officer-name strong{color:var(--accent2);}
.live-badge{background:rgba(62,207,178,0.1);border:1px solid rgba(62,207,178,0.3);color:var(--accent2);font-size:0.7rem;font-weight:700;padding:0.2rem 0.6rem;border-radius:20px;letter-spacing:0.05em;}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent2);margin-right:4px;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
.btn-sm{background:transparent;border:1px solid var(--border);color:var(--muted);padding:0.35rem 0.8rem;border-radius:6px;font-family:inherit;font-size:0.8rem;cursor:pointer;transition:all 0.2s;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.main-layout{display:flex;flex:1;overflow:hidden;position:relative;z-index:1;}
.sidebar{width:340px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;background:rgba(10,12,16,0.85);backdrop-filter:blur(8px);}
.sidebar-header{padding:0.8rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:0.4rem;margin-bottom:0.7rem;}
.stat-mini{background:var(--card);border-radius:8px;padding:0.5rem 0.4rem;text-align:center;border:1px solid var(--border);}
.stat-mini .num{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800;}
.stat-mini .lbl{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;}
.filters{display:flex;gap:0.35rem;flex-wrap:wrap;}
.filter-chip{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:0.25rem 0.6rem;border-radius:20px;font-size:0.72rem;cursor:pointer;transition:all 0.15s;}
.filter-chip:hover{border-color:var(--accent);color:var(--accent);}
.filter-chip.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:700;}
.filter-chip.sev-high.active{background:var(--danger);border-color:var(--danger);color:#fff;}
.filter-chip.sev-low.active{background:var(--accent2);border-color:var(--accent2);color:#000;}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:0.6rem;text-align:center;font-size:0.78rem;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600;}
.complaints-scroll{flex:1;overflow-y:auto;padding:0.5rem;}
.complaints-scroll::-webkit-scrollbar{width:3px;}
.complaints-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
.c-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.7rem 0.9rem;margin-bottom:0.4rem;cursor:pointer;transition:all 0.15s;position:relative;overflow:hidden;}
.c-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.c-card.high::before{background:var(--danger);}
.c-card.medium::before{background:var(--accent);}
.c-card.low::before{background:var(--accent2);}
.c-card:hover{border-color:var(--accent);transform:translateX(2px);}
.c-card.selected{border-color:var(--accent);background:#1a1f2e;}
.c-card.priority-flash{animation:priFlash 2s ease infinite;}
@keyframes priFlash{0%,100%{border-color:var(--border)}50%{border-color:var(--danger);box-shadow:0 0 12px rgba(224,92,92,0.3);}}
.c-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:0.25rem;}
.c-id{font-size:0.8rem;font-weight:700;color:var(--accent);}
.c-status{font-size:0.62rem;font-weight:700;text-transform:uppercase;padding:0.12rem 0.45rem;border-radius:20px;}
.st-pending{background:rgba(90,100,128,0.15);color:var(--muted);}
.st-assigned{background:rgba(245,166,35,0.15);color:var(--accent);}
.st-in_progress{background:rgba(59,130,246,0.15);color:var(--blue);}
.st-completed{background:rgba(34,197,94,0.15);color:#4ade80;}
.c-row2{font-size:0.75rem;color:var(--muted);}
.c-row2 strong{color:var(--text);}
.pri-badge{display:inline-block;background:rgba(224,92,92,0.15);color:var(--danger);font-size:0.62rem;font-weight:700;padding:0.1rem 0.4rem;border-radius:4px;margin-left:4px;}
.toast{position:fixed;top:70px;right:1rem;background:var(--card);border:1px solid var(--accent2);border-radius:10px;padding:0.8rem 1rem;font-size:0.85rem;color:var(--accent2);z-index:9999;transform:translateX(120%);transition:transform 0.3s;max-width:280px;}
.toast.show{transform:translateX(0);}
.map-area{flex:1;position:relative;isolation:isolate;}
#map{width:100%;height:100%;z-index:1;}
/* ALL MAP OVERLAYS: fixed z-index above leaflet */
.map-controls{position:absolute;top:1rem;left:1rem;z-index:1000;display:flex;flex-direction:column;gap:0.4rem;}
.map-btn{background:rgba(20,24,32,0.92);backdrop-filter:blur(6px);border:1px solid var(--border);color:var(--text);padding:0.45rem 0.8rem;border-radius:8px;font-family:inherit;font-size:0.78rem;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.map-btn:hover{border-color:var(--accent);color:var(--accent);}
.map-btn.pri-active{background:var(--danger);border-color:var(--danger);color:#fff;}
.map-legend{position:absolute;bottom:1rem;left:1rem;background:rgba(20,24,32,0.92);backdrop-filter:blur(6px);border:1px solid var(--border);border-radius:10px;padding:0.6rem 0.8rem;z-index:1000;font-size:0.75rem;}
.map-legend-title{color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.4rem;font-size:0.65rem;}
.legend-item{display:flex;align-items:center;gap:0.4rem;margin-bottom:0.2rem;}
.legend-dot{width:10px;height:10px;border-radius:50%;}
/* DETAIL PANEL - high z-index, never hides */
.detail-panel{position:absolute;top:0;right:0;bottom:0;width:370px;background:rgba(16,19,26,0.97);backdrop-filter:blur(12px);border-left:1px solid var(--border);overflow-y:auto;transform:translateX(100%);transition:transform 0.3s;z-index:2000;}
.detail-panel.open{transform:translateX(0);}
.detail-panel::-webkit-scrollbar{width:3px;}
.detail-panel::-webkit-scrollbar-thumb{background:var(--border);}
.dp-header{padding:1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;position:sticky;top:0;background:rgba(16,19,26,0.98);z-index:1;}
.dp-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:0.2rem;}
.dp-body{padding:1rem;}
.dp-img{width:100%;border-radius:10px;border:1px solid var(--border);margin-bottom:0.8rem;max-height:200px;object-fit:cover;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.8rem;}
.info-cell{background:var(--card);border-radius:8px;padding:0.55rem 0.7rem;border:1px solid var(--border);}
.info-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;}
.info-value{font-size:0.85rem;margin-top:2px;font-weight:500;}
.sev-badge{display:inline-block;padding:0.2rem 0.6rem;border-radius:20px;font-size:0.72rem;font-weight:700;}
.sev-high{background:rgba(224,92,92,0.15);color:var(--danger);}
.sev-medium{background:rgba(245,166,35,0.15);color:var(--accent);}
.sev-low{background:rgba(62,207,178,0.15);color:var(--accent2);}
.ba-wrap{position:relative;border-radius:10px;overflow:hidden;margin-bottom:0.8rem;border:1px solid var(--border);user-select:none;}
.ba-before{width:100%;height:170px;object-fit:cover;display:block;}
.ba-after-overlay{position:absolute;top:0;left:0;height:100%;overflow:hidden;}
.ba-after-overlay img{height:100%;object-fit:cover;}
.ba-slider{position:absolute;top:0;bottom:0;width:3px;background:white;cursor:ew-resize;transform:translateX(-50%);}
.ba-handle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:28px;height:28px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:#000;font-weight:700;pointer-events:none;}
.ba-labels{display:flex;justify-content:space-between;margin-bottom:0.4rem;}
.ba-labels span{font-size:0.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;}
.no-after{background:var(--card);border-radius:10px;padding:1rem;text-align:center;color:var(--muted);font-size:0.82rem;margin-bottom:0.8rem;border:1px dashed var(--border);}
.status-form{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:0.8rem;}
.status-form label{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:0.35rem;}
.status-form select,.status-form textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:0.55rem 0.75rem;font-family:inherit;font-size:0.85rem;margin-bottom:0.7rem;}
.status-form select:focus,.status-form textarea:focus{outline:none;border-color:var(--accent);}
.btn-update{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;padding:0.65rem;font-family:inherit;font-weight:700;font-size:0.88rem;cursor:pointer;transition:opacity 0.2s;}
.btn-update:hover{opacity:0.88;}
.btn-update:disabled{opacity:0.5;cursor:not-allowed;}
.save-ok{color:var(--accent2);font-size:0.8rem;text-align:center;margin-top:0.5rem;display:none;}
.upload-after-btn{width:100%;background:transparent;border:1px dashed var(--border);color:var(--muted);border-radius:8px;padding:0.65rem;font-family:inherit;font-size:0.82rem;cursor:pointer;transition:all 0.2s;margin-bottom:0.7rem;}
.upload-after-btn:hover{border-color:var(--accent2);color:var(--accent2);}
/* FUND */
.fund-form{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:0.8rem;}
.fund-form input{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:0.55rem 0.75rem;font-family:inherit;font-size:0.85rem;margin-bottom:0.7rem;}
.fund-form input:focus{outline:none;border-color:var(--accent2);}
.btn-fund{width:100%;background:var(--accent2);color:#000;border:none;border-radius:8px;padding:0.65rem;font-family:inherit;font-weight:700;font-size:0.88rem;cursor:pointer;}
/* LOGIN */
.login-overlay{position:fixed;inset:0;background:rgba(10,12,16,0.97);display:flex;align-items:center;justify-content:center;z-index:9999;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;width:340px;}
.login-box h2{font-family:'Syne',sans-serif;font-size:1.4rem;margin-bottom:0.3rem;}
.login-box p{color:var(--muted);font-size:0.85rem;margin-bottom:1.5rem;}
.login-field{margin-bottom:0.8rem;}
.login-field label{display:block;font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.3rem;}
.login-field input{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:0.65rem 0.9rem;font-family:inherit;font-size:0.9rem;}
.login-field input:focus{outline:none;border-color:var(--accent);}
.login-err{color:var(--danger);font-size:0.82rem;margin-bottom:0.8rem;display:none;}
.btn-login{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;padding:0.75rem;font-family:inherit;font-weight:700;font-size:0.95rem;cursor:pointer;}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:4px;}
@keyframes spin{to{transform:rotate(360deg)}}
.no-complaints{text-align:center;padding:2.5rem 1rem;color:var(--muted);}
.pri-num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;background:var(--danger);color:#fff;border-radius:50%;font-size:0.65rem;font-weight:800;margin-right:5px;}
/* Leaflet popup dark */
.leaflet-popup-content-wrapper{background:#141820!important;color:#e8eaf0!important;border:1px solid #1e2535!important;border-radius:10px!important;box-shadow:0 4px 20px rgba(0,0,0,0.5)!important;}
.leaflet-popup-tip{background:#141820!important;}
.leaflet-popup-content{margin:10px 14px!important;font-family:'DM Sans',sans-serif!important;}

/* Gradient theme override */
:root{
  --bg:#05070d;--surface:#0f1523;--card:#131d2e;--border:#27395a;
  --accent:#ff9a3d;--accent2:#ff4f7b;--danger:#ff6464;--blue:#7dd3fc;
  --text:#f4f7fb;--muted:#8ea3be;--glow:#ffd18c;
  --grad-main:linear-gradient(135deg,#ff9a3d 0%,#ff4f7b 52%,#7dd3fc 100%);
  --grad-soft:linear-gradient(160deg,rgba(255,154,61,.16),rgba(255,79,123,.08) 42%,rgba(125,211,252,.12));
}
body{
  background:
    radial-gradient(circle at 10% 15%, rgba(255,154,61,.12), transparent 28%),
    radial-gradient(circle at 86% 10%, rgba(255,79,123,.14), transparent 26%),
    radial-gradient(circle at 78% 82%, rgba(125,211,252,.12), transparent 30%),
    linear-gradient(180deg, #05070d 0%, #09111c 52%, #05070d 100%);
}
#bg-canvas{opacity:.42;}
.topbar{
  background:rgba(10,15,26,.9);
  border-bottom-color:rgba(125,211,252,.16);
  box-shadow:0 16px 36px rgba(0,0,0,.24);
}
.logo{letter-spacing:.04em;}
.logo span{
  color:var(--glow);
  text-shadow:0 0 18px rgba(255,154,61,.28);
}
.live-badge{
  background:rgba(125,211,252,.1);
  border-color:rgba(125,211,252,.26);
  color:var(--blue);
}
.live-dot{background:var(--blue);}
.btn-sm,.map-btn,.upload-after-btn{
  border-color:rgba(125,211,252,.16);
  background:rgba(14,22,37,.72);
}
.btn-sm:hover,.map-btn:hover,.upload-after-btn:hover{
  border-color:rgba(255,154,61,.48);
  color:var(--accent);
}
.btn-sm.active,.btn-login,.btn-update,.btn-fund{
  background:var(--grad-main);
  border:none;
  color:#14060c;
  box-shadow:0 12px 28px rgba(255,79,123,.2);
}
.sidebar{
  background:linear-gradient(180deg, rgba(10,14,24,.92), rgba(8,14,23,.84));
  border-right-color:rgba(125,211,252,.12);
}
.sidebar-header,.tabs,.sidebar{backdrop-filter:blur(12px);}
.stat-mini,.c-card,.status-form,.fund-form,.login-box,.map-legend,.detail-panel,.toast{
  background:
    linear-gradient(180deg, rgba(18,28,44,.95), rgba(13,22,36,.92));
  border-color:rgba(125,211,252,.14);
  box-shadow:0 18px 36px rgba(0,0,0,.18);
}
.filter-chip.active,.map-btn.pri-active{
  background:var(--grad-main);
  border:none;
  color:#14060c;
}
.tab.active{
  color:var(--glow);
  border-bottom-color:var(--glow);
}
.c-card:hover{
  border-color:rgba(255,154,61,.46);
  box-shadow:0 18px 36px rgba(255,154,61,.1);
}
.c-card.selected{
  border-color:rgba(255,154,61,.62);
  background:linear-gradient(180deg, rgba(31,23,39,.96), rgba(18,26,43,.94));
  box-shadow:0 0 0 1px rgba(255,154,61,.14), 0 20px 36px rgba(255,79,123,.1);
}
.stat-mini .num,.c-id,#dp-title{color:var(--glow);}
.pri-badge{
  background:rgba(255,79,123,.14);
  color:#ff93b5;
}
.map-area::after{
  content:'';
  position:absolute;
  inset:0;
  pointer-events:none;
  background:linear-gradient(180deg, rgba(255,154,61,.04), transparent 18%, transparent 82%, rgba(125,211,252,.05));
  z-index:2;
}
.map-controls,.map-legend{z-index:1001;}
.detail-panel{
  background:linear-gradient(180deg, rgba(10,14,24,.97), rgba(15,22,35,.96));
  border-left-color:rgba(125,211,252,.16);
}
.dp-header{
  background:rgba(10,14,24,.96);
  border-bottom-color:rgba(125,211,252,.12);
}
.status-form select:focus,.status-form textarea:focus,.fund-form input:focus,.login-field input:focus{
  border-color:rgba(255,154,61,.44);
  box-shadow:0 0 0 3px rgba(255,154,61,.08);
}
.leaflet-popup-content-wrapper{
  background:#171d2d!important;
  border-color:rgba(125,211,252,.16)!important;
}
.leaflet-popup-tip{background:#171d2d!important;}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<!-- LOGIN -->
<div class="login-overlay" id="login-overlay">
  <div class="login-box">
    <div style="font-size:2rem;margin-bottom:0.5rem">🛣️</div>
    <h2>Officer Portal</h2>
    <p>Road Damage Management System</p>
    <div class="login-err" id="login-err"></div>
    <div class="login-field"><label>Email</label><input type="email" id="lo-email" placeholder="officer@road.com"/></div>
    <div class="login-field"><label>Password</label><input type="password" id="lo-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Road<span>Watch</span> Officer</div>
  <div class="topbar-right">
    <div class="live-badge"><span class="live-dot"></span>LIVE</div>
    <div class="officer-name">Officer <strong id="officer-display">—</strong></div>
    <button class="btn-sm active" id="view-split" onclick="setView('split')">Split</button>
    <button class="btn-sm" id="view-map" onclick="setView('map')">Map</button>
    <button class="btn-sm" id="view-list" onclick="setView('list')">List</button>
    <button class="btn-sm" onclick="logout()">Sign Out</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="main-layout" id="main-layout">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="stats-row">
        <div class="stat-mini"><div class="num" id="st-total">0</div><div class="lbl">Total</div></div>
        <div class="stat-mini"><div class="num" style="color:var(--accent)" id="st-pending">0</div><div class="lbl">Pending</div></div>
        <div class="stat-mini"><div class="num" style="color:var(--blue)" id="st-progress">0</div><div class="lbl">Active</div></div>
        <div class="stat-mini"><div class="num" style="color:#4ade80" id="st-done">0</div><div class="lbl">Done</div></div>
      </div>
      <div class="filters" id="filter-bar">
        <div class="filter-chip active" onclick="setFilter('all',this)">All</div>
        <div class="filter-chip sev-high" onclick="setFilter('high',this)">🔴 High</div>
        <div class="filter-chip sev-medium" onclick="setFilter('medium',this)">🟡 Med</div>
        <div class="filter-chip sev-low" onclick="setFilter('low',this)">🟢 Low</div>
        <div class="filter-chip" onclick="setFilter('pending',this)">Pending</div>
        <div class="filter-chip" onclick="setFilter('in_progress',this)">Active</div>
        <div class="filter-chip" onclick="setFilter('completed',this)">Done</div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" id="tab-complaints" onclick="switchTab('complaints')">📋 Complaints</div>
      <div class="tab" id="tab-priority" onclick="switchTab('priority')">⚡ Priority</div>
      <div class="tab" id="tab-citizens" onclick="switchTab('citizens')">👤 Citizens</div>
    </div>
    <div class="complaints-scroll" id="complaints-scroll">
      <div class="no-complaints">Loading...</div>
    </div>
  </div>

  <!-- MAP -->
  <div class="map-area" id="map-area">
    <div id="map"></div>
    <div class="map-controls">
      <button class="map-btn" onclick="fitAllMarkers()">📍 Fit All</button>
      <button class="map-btn" onclick="goToMyLocation()">🎯 My Location</button>
      <button class="map-btn" id="pri-btn" onclick="togglePriority()">⚡ Priority</button>
    </div>
    <div class="map-legend">
      <div class="map-legend-title">Map Legend</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e05c5c"></div>High Severity</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff9a3d"></div>Medium</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7dd3fc"></div>Low</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4ade80"></div>Completed</div>
    </div>
    <!-- DETAIL PANEL -->
    <div class="detail-panel" id="detail-panel">
      <div class="dp-header">
        <div>
          <div id="dp-title" style="font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--accent)">—</div>
          <div id="dp-zone" style="font-size:0.72rem;color:var(--muted);margin-top:2px"></div>
        </div>
        <button class="dp-close" onclick="closeDetail()">✕</button>
      </div>
      <div class="dp-body" id="dp-body"></div>
    </div>
  </div>
</div>

<input type="file" id="after-file-input" accept="image/*" style="display:none" onchange="handleAfterPhoto(event)"/>

<script>
const BASE = window.location.origin;
const API = `${BASE}/api`;
const INDIA_TIMEZONE = 'Asia/Kolkata';
const DATE_FORMATTER = new Intl.DateTimeFormat('en-IN', { timeZone: INDIA_TIMEZONE, day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit', hour12: true });
const _up = new URLSearchParams(window.location.search);
if (_up.get('tk')) { localStorage.setItem('officer_token', _up.get('tk')); localStorage.setItem('officer_name', _up.get('nm') || 'officer'); window.history.replaceState({}, '', '/static/dashboard.html'); }
let token = localStorage.getItem('officer_token');
let officerName = localStorage.getItem('officer_name');
let allComplaints = [];
let currentFilter = 'all';
let currentTab = 'complaints';
let map, markers = [], priMarkers = [];
let selectedId = null;
let priorityMode = false;
let afterPhotoFor = null;
const afterPhotos = {};

function parseDateValue(value) {
  if (!value) return null;
  if (value instanceof Date) return Number.isNaN(value.getTime()) ? null : value;
  let normalized = String(value).trim();
  if (!normalized) return null;
  normalized = normalized.replace(' ', 'T');
  if (/^\d{4}-\d{2}-\d{2}$/.test(normalized)) {
    normalized = `${normalized}T00:00:00Z`;
  } else if (!/(Z|[+-]\d{2}:\d{2})$/i.test(normalized)) {
    normalized = `${normalized}Z`;
  }
  const parsed = new Date(normalized);
  return Number.isNaN(parsed.getTime()) ? null : parsed;
}

function formatDate(value) {
  const parsed = parseDateValue(value);
  return parsed ? DATE_FORMATTER.format(parsed) : '--';
}

// ── Init ──────────────────────────────────────────────
function init() {
  if (token) {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('officer-display').textContent = officerName || 'Officer';
    initMap();
    loadComplaints();
    startPolling();
  }
  initBg();
}

// ── Auth ──────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('lo-email').value;
  const pass = document.getElementById('lo-pass').value;
  const btn = document.getElementById('login-btn');
  btn.innerHTML = '<span class="spinner"></span>Signing in...'; btn.disabled = true;
  try {
    const res = await fetch(`${API}/auth/officer/login`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({email, password: pass})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');
    token = data.access_token;
    officerName = data.name || email.split('@')[0];
    localStorage.setItem('officer_token', token);
    localStorage.setItem('officer_name', officerName);
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('officer-display').textContent = officerName;
    initMap();
    loadComplaints();
    startPolling();
  } catch(e) {
    document.getElementById('login-err').textContent = e.message;
    document.getElementById('login-err').style.display = 'block';
  }
  btn.innerHTML = 'Sign In'; btn.disabled = false;
}

function logout() {
  token = null;
  localStorage.removeItem('officer_token');
  localStorage.removeItem('officer_name');
  location.reload();
}

// ── Load Complaints ───────────────────────────────────
async function loadComplaints() {
  try {
    const res = await fetch(`${API}/complaints/`, { headers:{Authorization:`Bearer ${token}`} });
    if (!res.ok) return;
    const data = await res.json();
    if (allComplaints.length > 0 && data.length > allComplaints.length) {
      showToast(`🆕 New: ${data[0].complaint_id} — ${data[0].severity.toUpperCase()}`);
    }
    allComplaints = data;
    updateStats();
    renderTab();
    renderMapMarkers();
  } catch(e) { console.error(e); }
}

function updateStats() {
  document.getElementById('st-total').textContent = allComplaints.length;
  document.getElementById('st-pending').textContent = allComplaints.filter(c=>['pending','assigned'].includes(c.status)).length;
  document.getElementById('st-progress').textContent = allComplaints.filter(c=>c.status==='in_progress').length;
  document.getElementById('st-done').textContent = allComplaints.filter(c=>c.status==='completed').length;
}

function getFiltered() {
  let list = [...allComplaints];
  if (currentFilter === 'all') return list;
  if (['high','medium','low'].includes(currentFilter)) return list.filter(c=>c.severity===currentFilter);
  return list.filter(c=>c.status===currentFilter||(currentFilter==='pending'&&c.status==='assigned'));
}

function getPrioritySorted() {
  return [...allComplaints]
    .filter(c => c.status !== 'completed')
    .sort((a,b) => {
      const sevScore = {high:3, medium:2, low:1};
      const as = (sevScore[a.severity]||0)*10 + (a.priority_score||0);
      const bs = (sevScore[b.severity]||0)*10 + (b.priority_score||0);
      return bs - as;
    });
}

// ── Tabs ──────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  renderTab();
}

function renderTab() {
  if (currentTab === 'complaints') renderList(getFiltered());
  else if (currentTab === 'priority') renderPriorityList();
  else if (currentTab === 'citizens') renderCitizensList();
}

function renderList(items) {
  const el = document.getElementById('complaints-scroll');
  if (!items.length) {
    el.innerHTML = `
      <div class="no-complaints">
        <div style="font-size:1rem;font-weight:600;margin-bottom:0.35rem">No complaints assigned yet</div>
        <div style="font-size:0.78rem;line-height:1.5">
          This officer does not have any assigned complaints right now.
          Use the admin panel to reassign one, or run <code>backend\\seed.py</code> to add demo data.
        </div>
      </div>`;
    return;
  }
  el.innerHTML = items.map(c => `
    <div class="c-card ${c.severity} ${selectedId===c.complaint_id?'selected':''}"
         onclick="selectComplaint('${c.complaint_id}')">
      <div class="c-row1">
        <div class="c-id">${c.complaint_id}</div>
        <div class="c-status st-${c.status}">${c.status.replace('_',' ')}</div>
      </div>
      <div class="c-row2">
        <strong>${c.damage_type.replace('_',' ')}</strong> · ${c.severity.toUpperCase()} · ${formatDate(c.created_at)}
      </div>
      ${c.address ? `<div class="c-row2" style="margin-top:2px;font-size:0.7rem;opacity:0.7">${c.address.substring(0,50)}</div>` : ''}
    </div>
  `).join('');
}

function renderPriorityList() {
  const items = getPrioritySorted();
  const el = document.getElementById('complaints-scroll');
  if (!items.length) { el.innerHTML='<div class="no-complaints">No active complaints</div>'; return; }
  el.innerHTML = items.map((c,i) => `
    <div class="c-card ${c.severity} ${selectedId===c.complaint_id?'selected':''} ${i<3?'priority-flash':''}"
         onclick="selectComplaint('${c.complaint_id}')">
      <div class="c-row1">
        <div class="c-id"><span class="pri-num">${i+1}</span>${c.complaint_id}</div>
        <span class="sev-badge sev-${c.severity}">${c.severity.toUpperCase()}</span>
      </div>
      <div class="c-row2"><strong>${c.damage_type.replace('_',' ')}</strong> · ${c.address ? c.address.substring(0,40) : 'No address'}</div>
    </div>
  `).join('');
}

function renderCitizensList() {
  const el = document.getElementById('complaints-scroll');
  // Group by user
  const byUser = {};
  allComplaints.forEach(c => {
    const uid = c.user_id || 'unknown';
    if (!byUser[uid]) byUser[uid] = {complaints: [], address: c.address};
    byUser[uid].complaints.push(c);
  });
  const users = Object.entries(byUser);
  if (!users.length) { el.innerHTML='<div class="no-complaints">No citizens yet</div>'; return; }
  el.innerHTML = users.map(([uid, d]) => `
    <div class="c-card medium" style="cursor:default">
      <div class="c-row1">
        <div class="c-id">User #${uid}</div>
        <div class="c-status st-assigned">${d.complaints.length} reports</div>
      </div>
      <div class="c-row2">
        Completed: ${d.complaints.filter(c=>c.status==='completed').length} /
        Active: ${d.complaints.filter(c=>c.status!=='completed').length}
      </div>
    </div>
  `).join('');
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderTab();
  renderMapMarkers();
}

// ── Leaflet Map ───────────────────────────────────────
function initMap() {
  if (map) return;
  map = L.map('map', {zoomControl:true}).setView([11.0168, 76.9558], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap', maxZoom:19
  }).addTo(map);
  // Dark overlay filter via CSS
  document.getElementById('map').style.filter = 'invert(1) hue-rotate(180deg) brightness(0.85) contrast(1.1)';
}

function markerColor(c) {
  if (c.status==='completed') return '#5eead4';
  if (c.severity==='high') return '#ff6464';
  if (c.severity==='medium') return '#ff9a3d';
  return '#7dd3fc';
}

function makeIcon(color, size=14, label='') {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size+8}" height="${size+8}">
    <circle cx="${(size+8)/2}" cy="${(size+8)/2}" r="${size/2}" fill="${color}" stroke="white" stroke-width="2"/>
    ${label ? `<text x="${(size+8)/2}" y="${(size+8)/2+4}" text-anchor="middle" fill="white" font-size="8" font-weight="bold">${label}</text>` : ''}
  </svg>`;
  return L.divIcon({html: svg, className:'', iconSize:[size+8,size+8], iconAnchor:[(size+8)/2,(size+8)/2]});
}

function renderMapMarkers() {
  if (!map) return;
  markers.forEach(m=>map.removeLayer(m));
  markers = [];
  priMarkers.forEach(m=>map.removeLayer(m));
  priMarkers = [];

  const items = priorityMode ? getPrioritySorted() : getFiltered();
  items.forEach((c,i) => {
    const color = markerColor(c);
    const size = c.severity==='high' ? 16 : c.severity==='medium' ? 13 : 11;
    const label = priorityMode && i < 9 ? String(i+1) : '';
    const icon = makeIcon(color, size, label);
    const m = L.marker([c.latitude, c.longitude], {icon}).addTo(map);
    const popup = L.popup({className:''}).setContent(`
      <div style="min-width:160px">
        <div style="color:#ffb86b;font-weight:700;font-size:13px;margin-bottom:4px">${c.complaint_id}</div>
        <div style="font-size:12px;margin-bottom:2px">${c.damage_type.replace('_',' ')} · <span style="color:${color}">${c.severity.toUpperCase()}</span></div>
        <div style="font-size:11px;color:#5a6480;margin-bottom:8px">${c.address ? c.address.substring(0,45) : 'No address'}</div>
        <button onclick="selectComplaint('${c.complaint_id}')" style="background:#f5a623;color:#000;border:none;border-radius:5px;padding:5px 10px;cursor:pointer;font-size:11px;font-weight:700;width:100%">View Details →</button>
      </div>`);
    m.bindPopup(popup);
    m.on('click', () => { selectComplaint(c.complaint_id); });
    markers.push(m);
  });
}

function fitAllMarkers() {
  if (!map || !markers.length) return;
  const group = L.featureGroup(markers);
  map.fitBounds(group.getBounds().pad(0.1));
}

function goToMyLocation() {
  if (!navigator.geolocation) return showToast('Geolocation not supported');
  navigator.geolocation.getCurrentPosition(pos => {
    map.setView([pos.coords.latitude, pos.coords.longitude], 16);
    L.circleMarker([pos.coords.latitude, pos.coords.longitude], {
      radius:10, color:'#3b82f6', fillColor:'#3b82f6', fillOpacity:0.5
    }).addTo(map).bindPopup('📍 Your Location').openPopup();
  }, () => showToast('Could not get location'));
}

function togglePriority() {
  priorityMode = !priorityMode;
  const btn = document.getElementById('pri-btn');
  btn.classList.toggle('pri-active', priorityMode);
  btn.textContent = priorityMode ? '⚡ Priority ON' : '⚡ Priority';
  if (priorityMode) {
    switchTab('priority');
    renderMapMarkers();
    if (markers.length) {
      const group = L.featureGroup(markers);
      map.fitBounds(group.getBounds().pad(0.15));
    }
    showToast('⚡ Priority mode — top complaints highlighted');
  } else {
    switchTab('complaints');
    renderMapMarkers();
  }
}

// ── Detail Panel ──────────────────────────────────────
async function selectComplaint(id) {
  selectedId = id;
  renderTab();
  const c = allComplaints.find(x=>x.complaint_id===id);
  if (c && map) { map.setView([c.latitude, c.longitude], 16); }
  // Open marker popup
  markers.forEach((m,i) => {
    const fc = getFiltered()[i] || getPrioritySorted()[i];
    if (fc && fc.complaint_id === id) m.openPopup();
  });
  const panel = document.getElementById('detail-panel');
  panel.classList.add('open');
  document.getElementById('dp-title').textContent = id;
  document.getElementById('dp-zone').textContent = c ? (c.address || '') : '';
  document.getElementById('dp-body').innerHTML = '<div style="color:var(--muted);text-align:center;padding:2rem">Loading...</div>';
  try {
    const res = await fetch(`${API}/complaints/${id}`, {headers:{Authorization:`Bearer ${token}`}});
    const comp = await res.json();
    renderDetail(comp);
  } catch(e) {
    document.getElementById('dp-body').innerHTML = `<div style="color:var(--danger)">${e.message}</div>`;
  }
}

function renderDetail(c) {
  const imgSrc = c.image_url ? `${BASE}${c.image_url}` : '';
  const hasAfter = afterPhotos[c.complaint_id];
  const sevColor = c.severity==='high'?'#ff6464':c.severity==='medium'?'#ff9a3d':'#7dd3fc';
  const priScore = c.priority_score || 0;
  const areaType = c.area_type || 'Residential';

  document.getElementById('dp-body').innerHTML = `
    <!-- Priority Zone Badge -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.8rem">
      <div style="background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.3);border-radius:8px;padding:0.3rem 0.7rem;font-size:0.75rem;color:var(--accent)">
        🏘️ ${areaType} · Priority Zone Classification
      </div>
      <div style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--danger)">P${priScore.toFixed ? priScore.toFixed(2) : priScore}</div>
    </div>

    <!-- Before/After -->
    <div class="ba-labels">
      <span>Before Repair</span>
      <span style="color:${hasAfter?'var(--accent2)':'var(--muted)'}">${hasAfter?'After Repair':'After Pending'}</span>
    </div>
    ${hasAfter ? `
    <div class="ba-wrap" id="ba-wrap">
      <img class="ba-before" src="${imgSrc}" alt="before"/>
      <div class="ba-after-overlay" id="ba-after" style="width:50%">
        <img src="${hasAfter}" style="width:200%;height:100%;object-fit:cover" alt="after"/>
      </div>
      <div class="ba-slider" id="ba-slider"><div class="ba-handle">⟺</div></div>
    </div>` : imgSrc ? `
    <img class="dp-img" src="${imgSrc}" alt="Road damage" onerror="this.style.display='none'"/>
    <div class="no-after">📸 Upload after-repair photo to enable comparison</div>` : ''}

    ${['in_progress','completed'].includes(c.status) ? `
    <button class="upload-after-btn" onclick="triggerAfterPhoto('${c.complaint_id}')">
      📸 ${hasAfter?'Update':'Upload'} After-Repair Photo
    </button>` : ''}

    <!-- Info Grid -->
    <div class="info-grid">
      <div class="info-cell"><div class="info-label">Type</div><div class="info-value">${c.damage_type.replace('_',' ')}</div></div>
      <div class="info-cell"><div class="info-label">Severity</div><div class="info-value"><span class="sev-badge sev-${c.severity}">${c.severity.toUpperCase()}</span></div></div>
      <div class="info-cell"><div class="info-label">AI Confidence</div><div class="info-value">${((c.ai_confidence||0)*100).toFixed(1)}%</div></div>
      <div class="info-cell"><div class="info-label">Reported</div><div class="info-value">${formatDate(c.created_at)}</div></div>
    </div>

    ${c.description ? `<div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.7rem;margin-bottom:0.8rem;font-size:0.8rem;color:var(--muted);line-height:1.5">${c.description}</div>` : ''}

    <!-- Mini Map -->
    <div style="border-radius:10px;overflow:hidden;margin-bottom:0.8rem;height:120px;border:1px solid var(--border)">
      <iframe width="100%" height="120" frameborder="0" loading="lazy"
        src="https://maps.google.com/maps?q=${c.latitude},${c.longitude}&z=17&output=embed&t=k"></iframe>
    </div>

    <!-- Budget -->
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:0.6rem 0.8rem;margin-bottom:0.8rem;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:0.75rem;color:var(--muted)">💰 Budget Allocated</span>
      <span style="font-weight:700;color:var(--accent2)">₹${c.allocated_fund || 0}</span>
    </div>

    <!-- Fund Allocation -->
    <div class="fund-form">
      <label style="font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:0.35rem">💰 Allocate Fund (₹)</label>
      <input type="number" id="dp-fund" placeholder="Enter amount in ₹" value="${c.allocated_fund||''}"/>
      <input type="text" id="dp-fund-note" placeholder="Fund note (optional)" value="${c.fund_note||''}"/>
      <button class="btn-fund" onclick="saveFund('${c.complaint_id}')">Allocate Fund</button>
    </div>

    <!-- Status Update -->
    <div class="status-form">
      <label>Update Status</label>
      <select id="dp-status">
        <option value="pending" ${c.status==='pending'?'selected':''}>Pending</option>
        <option value="assigned" ${c.status==='assigned'?'selected':''}>Assigned</option>
        <option value="in_progress" ${c.status==='in_progress'?'selected':''}>In Progress</option>
        <option value="completed" ${c.status==='completed'?'selected':''}>Completed</option>
        <option value="rejected" ${c.status==='rejected'?'selected':''}>Rejected</option>
      </select>
      <label>Officer Notes</label>
      <textarea id="dp-notes" rows="3" placeholder="Add inspection notes...">${c.officer_notes||''}</textarea>
      <button class="btn-update" id="dp-save-btn" onclick="saveStatus('${c.complaint_id}')">Save Update</button>
      <div class="save-ok" id="save-ok">✓ Updated successfully!</div>
    </div>
  `;
  if (hasAfter) initBASlider();
}

function initBASlider() {
  const wrap=document.getElementById('ba-wrap');
  const after=document.getElementById('ba-after');
  const slider=document.getElementById('ba-slider');
  if(!wrap||!after||!slider) return;
  let drag=false;
  const upd=(x)=>{
    const r=wrap.getBoundingClientRect();
    const p=Math.max(5,Math.min(95,((x-r.left)/r.width)*100));
    after.style.width=p+'%'; slider.style.left=p+'%';
  };
  slider.addEventListener('mousedown',()=>drag=true);
  window.addEventListener('mouseup',()=>drag=false);
  window.addEventListener('mousemove',e=>{if(drag)upd(e.clientX);});
  slider.addEventListener('touchstart',()=>drag=true);
  window.addEventListener('touchend',()=>drag=false);
  window.addEventListener('touchmove',e=>{if(drag)upd(e.touches[0].clientX);});
}

function triggerAfterPhoto(id) {
  afterPhotoFor = id;
  document.getElementById('after-file-input').click();
}

function handleAfterPhoto(e) {
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    afterPhotos[afterPhotoFor] = ev.target.result;
    const c = allComplaints.find(x=>x.complaint_id===afterPhotoFor);
    if(c) renderDetail(c);
    showToast('✅ After-repair photo added!');
  };
  reader.readAsDataURL(file);
}

async function saveStatus(id) {
  const status = document.getElementById('dp-status').value;
  const notes = document.getElementById('dp-notes').value;
  const btn = document.getElementById('dp-save-btn');
  btn.innerHTML='<span class="spinner"></span>Saving...'; btn.disabled=true;
  try {
    const res = await fetch(`${API}/complaints/${id}/status`, {
      method:'PATCH', headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
      body: JSON.stringify({status, officer_notes:notes})
    });
    if(!res.ok) throw new Error('Update failed');
    document.getElementById('save-ok').style.display='block';
    setTimeout(()=>document.getElementById('save-ok').style.display='none', 2500);
    await loadComplaints();
  } catch(e) { alert(e.message); }
  btn.innerHTML='Save Update'; btn.disabled=false;
}

async function saveFund(id) {
  const amount = parseFloat(document.getElementById('dp-fund').value) || 0;
  const note = document.getElementById('dp-fund-note').value;
  try {
    const res = await fetch(`${API}/complaints/${id}/fund`, {
      method:'PATCH', headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
      body: JSON.stringify({amount, note})
    });
    if(!res.ok) throw new Error('Fund allocation failed');
    showToast(`✅ ₹${amount} allocated successfully!`);
    await loadComplaints();
    selectComplaint(id);
  } catch(e) { showToast(`❌ ${e.message}`); }
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  selectedId = null;
  renderTab();
}

// ── View Modes ────────────────────────────────────────
function setView(v) {
  const sidebar = document.getElementById('sidebar');
  const mapArea = document.getElementById('map-area');
  document.querySelectorAll('.btn-sm').forEach(b=>b.classList.remove('active'));
  document.getElementById(`view-${v}`).classList.add('active');
  if(v==='split'){sidebar.style.display='flex';sidebar.style.width='340px';mapArea.style.display='block';}
  if(v==='map'){sidebar.style.display='none';mapArea.style.display='block';}
  if(v==='list'){sidebar.style.display='flex';sidebar.style.width='100%';mapArea.style.display='none';}
  if(map) setTimeout(()=>map.invalidateSize(), 100);
}

// ── Toast ─────────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 4000);
}

// ── Polling ───────────────────────────────────────────
function startPolling() { setInterval(()=>loadComplaints(), 12000); }

// ── Animated Background ───────────────────────────────
function initBg() {
  const canvas=document.getElementById('bg-canvas');
  const ctx=canvas.getContext('2d');
  let W,H,nodes=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);
  for(let i=0;i<60;i++) nodes.push({
    x:Math.random()*1920,y:Math.random()*1080,
    vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
    r:Math.random()*1.8+0.8,
    color:Math.random()>0.6?'#7dd3fc':Math.random()>0.5?'#ff9a3d':'#ff4f7b'
  });
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<150){ctx.beginPath();ctx.strokeStyle=`rgba(125,211,252,${0.1*(1-d/150)})`;ctx.lineWidth=0.5;ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);ctx.stroke();}
      }
    }
    nodes.forEach(n=>{
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);
      ctx.fillStyle=n.color;ctx.shadowColor=n.color;ctx.shadowBlur=6;ctx.fill();ctx.shadowBlur=0;
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;
    });
    requestAnimationFrame(draw);
  }
  draw();
}

init();
</script>
